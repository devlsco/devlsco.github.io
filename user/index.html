<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>LsCo Userinfo - github.io</title>
    <link rel="icon" href="../img/icon.png" type="image/x-icon">

    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>

<body>
    <main>
        <div class="title">
            <h2>Search User</h2>
        </div>
        <div class="border">
            <div class="text-border">
                <input class="input" type="text" placeholder="User" id='user'>
                <button class="input" href onclick="event.preventDefault(); location=`?/${user.value}`">Load users</button>
                <div>
                    <h4>DisplayName: <a id="text1"></a> - ID: <a id="text2"></a></h4>
                    <h4>Followers: <a id="text3"></a> - Views: <a id="text4"></a></h4>
                    <h4>CreatedAt: <a id="text5"></a></h4>
                    <h4>VerifiedBot: <a id="text6"></a></h4>
                    <h4>IsAffiliate: <a id="text7"></a></h4>
                    <h4>IsPartner: <a id="text8"></a></h4>
                    <h4>Bio: " <a id="text9"></a> "</h4>
                    <h4>Banned: <a id="text10"></a></h4>
                    <div class="border">
                        <div class="text-border">
                            <div>
                                <div class="title">
                                    <h3><a onclick="openInNewTab()">ModLookUp</a></h3>
                                </div>
                                <h4>Follow total: <a class="underlined" id="text11"></a> - Views total: <a class="underlined" id="text12"></a></h4>
                                <h4>Channels: <a class="underlined" id="text13"></a> - Partners: <a class="underlined" id="text14"></a></h4>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
